 russia.1.title: "Reign of Nicholas, the Soldier Tsar"
 russia.1.desc: "After a series of unlikely events, being a third son of the Tsar, unlikely to ever reign, Nicholas — as any good Romanov following tradition would do — embraced soldierly, spit, polish and a military career. However, when his brother Alexander passed childless, and his brother Constantine disinherited himself having a wife of lower standing rather than the throne, Nicholas heeded the duty's call. The unrest and danger of his first days in 1825 left a deep mark on Nicholas' character and would follow him throughout his reign. Nicholas I came to represent autocracy personified: infinitely majestic, determined and powerful, hard as stone, and relentless as fate. In everyday affairs, he was very demanding of his family, the court, and all who were in civil service, and he put a high priority on order and obedience. A military man by nature, Nicholas I especially trusted the military and installed them in all key positions in the country."
 russia.1.a: "Paternal Autocrat of Russia"
 russia.2.title: "Russia in 1836"
 russia.2.desc: "The emperor loved everything Russian, and insisted on Russian language and manners at court (until then, French, and sometimes German, was spoken). Despite the rather harsh political regime, literature and art flourished. This was the era during which the poets Pushkin and Lermontov worked, when Zhukovsky brilliantly translated foreign poetry, when Mikhail Glinka composed the first Russian operas, and Karl Bryullev and Alexander Ivanov painted their masterpieces. Nicholas lead Russia successfully through wars with Qajar Persia (1826-1829), Ottomans (1828-1829), further pursued conquest of the Caucasus, and navigated European Concert of Europe fairly well as a true Gendarme of Europe. He embraced the official policy of the state as Orthodoxy, Autocracy, Nationality, which marked Russia for many decades to come. Industrial Revolution eventually reached Russia's doorstep, however, it lagged behind its major contemporaries in the West."
 russia.2.a: "Orthodoxy, Autocracy, Nationality!"
